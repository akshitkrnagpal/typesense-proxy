name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.2)"
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install

      - name: Set version
        run: |
          VERSION=${{ inputs.version }}
          for dir in packages/js packages/api packages/web packages/cli; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$dir/package.json', 'utf-8'));
              pkg.version = '$VERSION';
              if (pkg.dependencies && pkg.dependencies['@tsproxy/js'] === 'workspace:*') {
                pkg.dependencies['@tsproxy/js'] = '^$VERSION';
              }
              fs.writeFileSync('$dir/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          done
          echo "Versions set to $VERSION"
          grep '"version"' packages/*/package.json

      - name: Build
        run: pnpm build

      - name: Publish @tsproxy/js
        working-directory: packages/js
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/api
        working-directory: packages/api
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/react
        working-directory: packages/web
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}" --force

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ inputs.version }}
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## ${VERSION}/,/^## [0-9]/" CHANGELOG.md | head -n -1 | tail -n +2)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: |
            ${{ steps.changelog.outputs.notes }}

            ## Packages

            | Package | Version |
            |---------|---------|
            | [@tsproxy/cli](https://www.npmjs.com/package/@tsproxy/cli/v/${{ inputs.version }}) | `${{ inputs.version }}` |
            | [@tsproxy/api](https://www.npmjs.com/package/@tsproxy/api/v/${{ inputs.version }}) | `${{ inputs.version }}` |
            | [@tsproxy/js](https://www.npmjs.com/package/@tsproxy/js/v/${{ inputs.version }}) | `${{ inputs.version }}` |
            | [@tsproxy/react](https://www.npmjs.com/package/@tsproxy/react/v/${{ inputs.version }}) | `${{ inputs.version }}` |
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
