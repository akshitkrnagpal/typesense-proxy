name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.2)"
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install

      - name: Set version
        run: |
          VERSION=${{ inputs.version }}
          for dir in packages/js packages/api packages/web packages/cli; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$dir/package.json', 'utf-8'));
              pkg.version = '$VERSION';
              if (pkg.dependencies && pkg.dependencies['@tsproxy/js'] === 'workspace:*') {
                pkg.dependencies['@tsproxy/js'] = '^$VERSION';
              }
              fs.writeFileSync('$dir/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          done
          echo "Versions set to $VERSION"
          grep '"version"' packages/*/package.json

      - name: Build
        run: pnpm build

      - name: Publish @tsproxy/js
        working-directory: packages/js
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/api
        working-directory: packages/api
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/react
        working-directory: packages/web
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
