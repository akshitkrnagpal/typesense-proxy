name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.2)"
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install

      - name: Set version
        run: |
          pnpm --filter @tsproxy/api version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tsproxy/js version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tsproxy/react version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tsproxy/cli version ${{ inputs.version }} --no-git-tag-version

      - name: Update @tsproxy/js dependency in @tsproxy/react
        run: |
          cd packages/web
          node -e "
            const pkg = require('./package.json');
            pkg.dependencies['@tsproxy/js'] = '^${{ inputs.version }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build
        run: pnpm build

      - name: Publish @tsproxy/js
        working-directory: packages/js
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/api
        working-directory: packages/api
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/react
        working-directory: packages/web
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tsproxy/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
