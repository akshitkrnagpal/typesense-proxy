services:
  typesense:
    image: typesense/typesense:30.0
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: >
      --data-dir /data
      --api-key=test-api-key
      --enable-cors
      --enable-search-analytics=true
      --analytics-dir=/data/analytics

volumes:
  typesense-data:
